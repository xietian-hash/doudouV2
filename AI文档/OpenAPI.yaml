openapi: 3.0.3
info:
  title: 兜兜有钱 API
  version: 0.1.0
  description: |
    兜兜有钱微信记账小程序接口契约。

    设计契约：
    1. 前后端开发前，优先编写并落盘接口契约文档到本文件。
    2. 所有非登录接口必须明确鉴权方式。
    3. 所有业务接口必须明确权限点。当前一期权限点以接口权限和当前用户数据权限为主，不引入菜单/RBAC 体系。
    4. 用户最终通过微信 openid 识别；后端使用 wxCode 换取 openid，创建或识别 users.openid 后签发 JWT。
servers:
  - url: /api
    description: 默认 API 前缀
tags:
  - name: Auth
    description: 登录与当前用户
  - name: Accounts
    description: 账户管理
  - name: Categories
    description: 分类与分类图标
  - name: Tags
    description: 标签管理
  - name: Bills
    description: 账单管理
  - name: Voice
    description: 语音记账
  - name: Statistics
    description: 统计分析
  - name: Feedback
    description: 意见反馈
  - name: Import
    description: 数据导入
  - name: Export
    description: 数据导出

security:
  - bearerAuth: []

paths:
  /auth/wechat-login:
    post:
      tags: [Auth]
      summary: 微信小程序登录
      description: 后端使用 wxCode 换取微信 openid，并以 users.openid 创建或识别用户后签发 JWT。
      security: []
      x-permissions:
        auth: none
        interface: auth:wechat-login
        dataScope: none
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WechatLoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResult'
        '400':
          $ref: '#/components/responses/ValidationError'

  /users/me:
    get:
      tags: [Auth]
      summary: 获取当前用户信息
      x-permissions:
        auth: bearer
        interface: users:read-self
        dataScope: current-user
      responses:
        '200':
          description: 当前用户信息
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /accounts:
    get:
      tags: [Accounts]
      summary: 查询账户列表
      x-permissions:
        auth: bearer
        interface: accounts:list
        dataScope: current-user
      responses:
        '200':
          description: 账户列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Account'
    post:
      tags: [Accounts]
      summary: 新增账户
      x-permissions:
        auth: bearer
        interface: accounts:create
        dataScope: current-user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreateRequest'
      responses:
        '200':
          description: 新增成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Account'
        '409':
          $ref: '#/components/responses/ConflictError'

  /accounts/{accountId}:
    patch:
      tags: [Accounts]
      summary: 编辑账户
      x-permissions:
        auth: bearer
        interface: accounts:update
        dataScope: current-user-owned-resource
      parameters:
        - $ref: '#/components/parameters/AccountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdateRequest'
      responses:
        '200':
          description: 编辑成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Account'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [Accounts]
      summary: 删除账户
      x-permissions:
        auth: bearer
        interface: accounts:delete
        dataScope: current-user-owned-resource
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /accounts/{accountId}/default:
    post:
      tags: [Accounts]
      summary: 设置默认账户
      x-permissions:
        auth: bearer
        interface: accounts:set-default
        dataScope: current-user-owned-resource
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /category-icons:
    get:
      tags: [Categories]
      summary: 查询分类图标库
      x-permissions:
        auth: bearer
        interface: category-icons:list
        dataScope: shared-enabled-icons
      responses:
        '200':
          description: 分类图标列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/CategoryIcon'

  /categories:
    get:
      tags: [Categories]
      summary: 查询分类列表
      x-permissions:
        auth: bearer
        interface: categories:list
        dataScope: current-user
      parameters:
        - name: type
          in: query
          required: false
          description: 分类类型：1支出 2收入
          schema:
            $ref: '#/components/schemas/BillType'
        - name: onlyLeaf
          in: query
          required: false
          description: 是否只返回叶子分类
          schema:
            type: boolean
      responses:
        '200':
          description: 分类列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Category'
    post:
      tags: [Categories]
      summary: 新增分类
      x-permissions:
        auth: bearer
        interface: categories:create
        dataScope: current-user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreateRequest'
      responses:
        '200':
          description: 新增成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Category'
        '409':
          $ref: '#/components/responses/ConflictError'

  /categories/{categoryId}:
    patch:
      tags: [Categories]
      summary: 编辑分类
      x-permissions:
        auth: bearer
        interface: categories:update
        dataScope: current-user-owned-resource
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryUpdateRequest'
      responses:
        '200':
          description: 编辑成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Category'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    delete:
      tags: [Categories]
      summary: 删除分类
      x-permissions:
        auth: bearer
        interface: categories:delete
        dataScope: current-user-owned-resource
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '409':
          $ref: '#/components/responses/ConflictError'

  /tags:
    get:
      tags: [Tags]
      summary: 查询标签列表
      x-permissions:
        auth: bearer
        interface: tags:list
        dataScope: current-user
      responses:
        '200':
          description: 标签列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Tag'
    post:
      tags: [Tags]
      summary: 新增标签
      x-permissions:
        auth: bearer
        interface: tags:create
        dataScope: current-user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagCreateRequest'
      responses:
        '200':
          description: 新增成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Tag'

  /tags/{tagId}:
    patch:
      tags: [Tags]
      summary: 重命名标签
      x-permissions:
        auth: bearer
        interface: tags:update
        dataScope: current-user-owned-resource
      parameters:
        - $ref: '#/components/parameters/TagId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagUpdateRequest'
      responses:
        '200':
          description: 编辑成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Tag'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    delete:
      tags: [Tags]
      summary: 删除标签
      x-permissions:
        auth: bearer
        interface: tags:delete
        dataScope: current-user-owned-resource
      parameters:
        - $ref: '#/components/parameters/TagId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /bills:
    get:
      tags: [Bills]
      summary: 查询账单列表
      x-permissions:
        auth: bearer
        interface: bills:list
        dataScope: current-user
      parameters:
        - name: month
          in: query
          required: false
          description: 月份，格式 YYYY-MM
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}$"
        - name: date
          in: query
          required: false
          description: 日期，格式 YYYY-MM-DD
          schema:
            type: string
            format: date
        - name: year
          in: query
          required: false
          description: 年份，格式 YYYY。与 month/date 互斥使用
          schema:
            type: string
            pattern: "^\\d{4}$"
        - name: categoryId
          in: query
          required: false
          description: 精确匹配指定分类（叶子）下的账单
          schema:
            type: string
        - name: type
          in: query
          required: false
          description: 1=支出 2=收入
          schema:
            type: integer
            enum: [1, 2]
        - $ref: '#/components/parameters/PageNo'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 账单分页列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BillPage'
    post:
      tags: [Bills]
      summary: 新增账单
      x-permissions:
        auth: bearer
        interface: bills:create
        dataScope: current-user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillCreateRequest'
      responses:
        '200':
          description: 新增成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Bill'

  /bills/batch:
    post:
      tags: [Bills]
      summary: 批量新增账单
      x-permissions:
        auth: bearer
        interface: bills:batch-create
        dataScope: current-user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bills]
              properties:
                bills:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/BillCreateRequest'
      responses:
        '200':
          description: 批量新增成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Bill'

  /bills/{billId}:
    get:
      tags: [Bills]
      summary: 查询账单详情
      x-permissions:
        auth: bearer
        interface: bills:read
        dataScope: current-user-owned-resource
      parameters:
        - $ref: '#/components/parameters/BillId'
      responses:
        '200':
          description: 账单详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BillDetail'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    patch:
      tags: [Bills]
      summary: 编辑账单
      x-permissions:
        auth: bearer
        interface: bills:update
        dataScope: current-user-owned-resource
      parameters:
        - $ref: '#/components/parameters/BillId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillUpdateRequest'
      responses:
        '200':
          description: 编辑成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Bill'
    delete:
      tags: [Bills]
      summary: 删除账单
      x-permissions:
        auth: bearer
        interface: bills:delete
        dataScope: current-user-owned-resource
      parameters:
        - $ref: '#/components/parameters/BillId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /bills/calendar-summary:
    get:
      tags: [Bills]
      summary: 查询日历每日收支汇总
      x-permissions:
        auth: bearer
        interface: bills:calendar-summary
        dataScope: current-user
      parameters:
        - name: month
          in: query
          required: true
          description: 月份，格式 YYYY-MM
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}$"
      responses:
        '200':
          description: 日历汇总
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/CalendarSummaryItem'

  /voice/parse:
    post:
      tags: [Voice]
      summary: 解析语音记账文本
      description: 接收语音识别文本，调用大模型解析为待确认账单数组。
      x-permissions:
        auth: bearer
        interface: voice:parse
        dataScope: current-user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoiceParseRequest'
      responses:
        '200':
          description: 解析结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/VoiceParsedBill'

  /statistics/category-expense:
    get:
      tags: [Statistics]
      deprecated: true
      summary: (已废弃) 查询当月支出分类占比
      description: 已被 /statistics/overview 取代。保留供旧客户端使用。
      x-permissions:
        auth: bearer
        interface: statistics:category-expense
        dataScope: current-user
      parameters:
        - name: month
          in: query
          required: true
          description: 月份，格式 YYYY-MM
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}$"
      responses:
        '200':
          description: 分类支出统计
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/CategoryExpenseStat'

  /statistics/overview:
    get:
      tags: [Statistics]
      summary: 统计总览（摘要 + 分类聚合 + 关键洞察）
      description: |
        支持 3 个时间维度（月/年/全部）、2 个分类层级（一级/二级）、2 个收支类型（支出/收入）。
        period=month 时摘要返回同比（去年同月）和环比（上月）；period=year 时摘要返回同比（去年）；period=all 时不返回 dailyAvg / prevTotal / changePercent / yearOverYear / periodOverPeriod。
      x-permissions:
        auth: bearer
        interface: statistics:overview
        dataScope: current-user
      parameters:
        - {
            name: period,
            in: query,
            required: true,
            schema: { type: string, enum: [month, year, all] },
          }
        - {
            name: month,
            in: query,
            required: false,
            description: period=month 时必填，YYYY-MM,
            schema: { type: string, pattern: "^\\d{4}-(0[1-9]|1[0-2])$" },
          }
        - {
            name: year,
            in: query,
            required: false,
            description: period=year 时必填，YYYY,
            schema: { type: string, pattern: "^\\d{4}$" },
          }
        - {
            name: level,
            in: query,
            required: true,
            description: 1=一级分类 2=二级分类,
            schema: { type: integer, enum: [1, 2] },
          }
        - {
            name: type,
            in: query,
            required: true,
            description: 1=支出 2=收入,
            schema: { type: integer, enum: [1, 2] },
          }
      responses:
        '200':
          description: 统计总览
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StatsOverviewResult'

  /statistics/category-trend:
    get:
      tags: [Statistics]
      summary: 各分类近 6 个月金额趋势
      description: 固定回溯到当月起的 6 个月，用于排行榜每行的迷你柱状图。
      x-permissions:
        auth: bearer
        interface: statistics:category-trend
        dataScope: current-user
      parameters:
        - { name: level, in: query, required: true, schema: { type: integer, enum: [1, 2] } }
        - { name: type, in: query, required: true, schema: { type: integer, enum: [1, 2] } }
      responses:
        '200':
          description: 分类趋势
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StatsCategoryTrendResult'

  /statistics/daily-series:
    get:
      tags: [Statistics]
      summary: 按天/按月的金额序列
      description: |
        period=month 返回当月每天的金额（空天补 0）；period=year 仅返回有账单的日；period=all 自动按月聚合。
        响应中 granularity 字段表明粒度。
      x-permissions:
        auth: bearer
        interface: statistics:daily-series
        dataScope: current-user
      parameters:
        - {
            name: period,
            in: query,
            required: true,
            schema: { type: string, enum: [month, year, all] },
          }
        - {
            name: month,
            in: query,
            required: false,
            schema: { type: string, pattern: "^\\d{4}-(0[1-9]|1[0-2])$" },
          }
        - { name: year, in: query, required: false, schema: { type: string, pattern: "^\\d{4}$" } }
        - { name: type, in: query, required: true, schema: { type: integer, enum: [1, 2] } }
      responses:
        '200':
          description: 金额序列
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StatsDailySeriesResult'

  /statistics/top-bills:
    get:
      tags: [Statistics]
      summary: 期间内金额最大的 N 笔账单
      x-permissions:
        auth: bearer
        interface: statistics:top-bills
        dataScope: current-user
      parameters:
        - {
            name: period,
            in: query,
            required: true,
            schema: { type: string, enum: [month, year, all] },
          }
        - {
            name: month,
            in: query,
            required: false,
            schema: { type: string, pattern: "^\\d{4}-(0[1-9]|1[0-2])$" },
          }
        - { name: year, in: query, required: false, schema: { type: string, pattern: "^\\d{4}$" } }
        - { name: type, in: query, required: true, schema: { type: integer, enum: [1, 2] } }
        - {
            name: limit,
            in: query,
            required: false,
            schema: { type: integer, minimum: 1, maximum: 20, default: 5 },
          }
      responses:
        '200':
          description: TOP 单笔
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StatsTopBillsResult'

  /feedback/images:
    post:
      tags: [Feedback]
      summary: 上传反馈照片
      description: 上传单张反馈照片，前端最多上传 3 张后随反馈内容提交 URL。
      x-permissions:
        auth: bearer
        interface: feedback:upload-image
        dataScope: current-user
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: 上传成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FeedbackImageUploadResult'
        '400':
          $ref: '#/components/responses/ValidationError'

  /feedback:
    post:
      tags: [Feedback]
      summary: 提交意见反馈
      x-permissions:
        auth: bearer
        interface: feedback:create
        dataScope: current-user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackCreateRequest'
      responses:
        '200':
          description: 提交成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FeedbackCreateResult'
        '400':
          $ref: '#/components/responses/ValidationError'

  /import/template:
    get:
      tags: [Import]
      summary: 下载导入模板
      description: |
        生成当前用户的 Excel 导入模板。
        模板包含 3 个 sheet：账单数据（带 3 行示例）、合法值清单（用户的二级分类/账户/标签）、使用说明。
      x-permissions:
        auth: bearer
        interface: import:template
        dataScope: current-user
      responses:
        '200':
          description: 返回 Excel 文件流
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  /import/bills:
    post:
      tags: [Import]
      summary: 上传账单 Excel 并批量入账
      description: |
        上传按模板填写的 Excel 文件。后端逐行校验，任一行错误整批拒绝并生成错误清单 Excel。
        校验通过后按「日期+金额+分类+账户+备注」自动跳过重复账单，剩余数据在事务中批量入账。
      x-permissions:
        auth: bearer
        interface: import:bills
        dataScope: current-user
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: .xlsx 或 .xls 文件，单次最多 10000 行
      responses:
        '200':
          description: 解析与入账结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ImportBillsResult'
        '400':
          $ref: '#/components/responses/ValidationError'

  /export/bills:
    post:
      tags: [Export]
      summary: 导出账单到邮箱
      description: |
        将当前用户默认账本下的全部账单、分类、账户数据生成 Excel 文件，
        以附件形式发送到用户指定邮箱。
      x-permissions:
        auth: jwt
        interface: export:bills
        dataScope: current-user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  description: 接收导出文件的邮箱地址
      responses:
        '200':
          description: 邮件发送成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: 'null'
        '400':
          $ref: '#/components/responses/ValidationError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        除微信登录接口外，其他接口均使用 JWT Bearer 鉴权。
        后端从 JWT 中解析当前 userId，并基于 userId 做当前用户数据隔离。

  parameters:
    AccountId:
      name: accountId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    CategoryId:
      name: categoryId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    TagId:
      name: tagId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    BillId:
      name: billId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    PageNo:
      name: pageNo
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    Ok:
      description: 操作成功
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessEnvelope'
    ValidationError:
      description: 参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    UnauthorizedError:
      description: 未登录或 token 失效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ForbiddenError:
      description: 无权限或跨用户数据访问
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFoundError:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ConflictError:
      description: 唯一约束冲突或业务状态冲突
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    SuccessEnvelope:
      type: object
      required: [code, message, traceId]
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data:
          description: 成功响应数据，不同接口返回不同结构；无数据时可为空对象或 null
        traceId:
          type: string
          example: 018f0d8b9d2c4b91

    ErrorEnvelope:
      type: object
      required: [code, message, traceId]
      properties:
        code:
          type: integer
          example: 10001
        message:
          type: string
          example: VALIDATION_ERROR
        details:
          type: object
          nullable: true
          additionalProperties: true
        traceId:
          type: string
          example: 018f0d8b9d2c4b91

    WechatLoginRequest:
      type: object
      required: [wxCode]
      properties:
        wxCode:
          type: string
          description: wx.login 获取的微信登录 code
        nickname:
          type: string
          maxLength: 50
          nullable: true
        avatarUrl:
          type: string
          maxLength: 255
          nullable: true

    LoginResult:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: JWT
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      required: [id, openid, status]
      properties:
        id:
          type: integer
          format: int64
        openid:
          type: string
          description: 微信 openid
        nickname:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        status:
          type: integer
          enum: [0, 1]

    AccountType:
      type: integer
      description: 账户类型：1现金 2银行卡 3支付宝 4微信 5其他
      enum: [1, 2, 3, 4, 5]

    Account:
      type: object
      required: [id, ledgerId, name, type, balance, sort, isDefault]
      properties:
        id:
          type: integer
          format: int64
        ledgerId:
          type: integer
          format: int64
          description: 当前默认账本 ID
        name:
          type: string
        type:
          $ref: '#/components/schemas/AccountType'
        balance:
          type: string
          format: decimal
          example: '100.00'
        icon:
          type: string
          nullable: true
        sort:
          type: integer
        isDefault:
          type: boolean

    AccountCreateRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        type:
          $ref: '#/components/schemas/AccountType'
        icon:
          type: string
          maxLength: 50
          nullable: true

    AccountUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        type:
          $ref: '#/components/schemas/AccountType'
        icon:
          type: string
          maxLength: 50
          nullable: true

    BillType:
      type: integer
      description: 账单类型：1支出 2收入
      enum: [1, 2]

    CategoryIcon:
      type: object
      required: [id, icon, name, sort]
      properties:
        id:
          type: integer
          format: int64
        icon:
          type: string
          description: Unicode Emoji
          example: 🍜
        name:
          type: string
          example: 餐饮
        sort:
          type: integer

    Category:
      type: object
      required: [id, ledgerId, name, type, sort]
      properties:
        id:
          type: integer
          format: int64
        ledgerId:
          type: integer
          format: int64
          description: 当前默认账本 ID
        parentId:
          type: integer
          format: int64
          nullable: true
        name:
          type: string
        type:
          $ref: '#/components/schemas/BillType'
        icon:
          type: string
          nullable: true
        sort:
          type: integer
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        children:
          type: array
          items:
            $ref: '#/components/schemas/Category'
        tags:
          type: array
          description: 分类绑定的标签；当前主要用于支出二级分类的经济属性标签
          items:
            $ref: '#/components/schemas/Tag'

    CategoryCreateRequest:
      type: object
      required: [name, type]
      description: 新增支出二级分类时，接口先返回创建结果，再由后端异步调用大模型自动绑定一个经济属性标签。
      properties:
        parentId:
          type: integer
          format: int64
          nullable: true
        name:
          type: string
          minLength: 1
          maxLength: 50
        type:
          $ref: '#/components/schemas/BillType'
        icon:
          type: string
          maxLength: 20
          nullable: true

    CategoryUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        icon:
          type: string
          maxLength: 20
          nullable: true

    Tag:
      type: object
      required: [id, ledgerId, name, tagType, canEdit, canDelete]
      properties:
        id:
          type: integer
          format: int64
        ledgerId:
          type: integer
          format: int64
          description: 当前默认账本 ID
        name:
          type: string
        description:
          type: string
          nullable: true
          maxLength: 255
          description: 标签描述，用于解释标签含义和后续 AI 判断
        tagType:
          type: string
          description: 标签分类：economic=经济属性，user=用户自建，system=系统标签
          enum: [economic, user, system]
        canEdit:
          type: boolean
          description: 是否允许编辑
        canDelete:
          type: boolean
          description: 是否允许删除

    TagCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 20
        description:
          type: string
          nullable: true
          maxLength: 255
      description: 新增标签固定创建为用户自建标签，默认允许编辑和删除。

    TagUpdateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 20
        description:
          type: string
          nullable: true
          maxLength: 255

    BillSource:
      type: integer
      description: 来源：1手工录入 2语音识别
      enum: [1, 2]

    BillCreateRequest:
      type: object
      required: [accountId, categoryId, type, amount, billDate]
      properties:
        accountId:
          type: integer
          format: int64
        categoryId:
          type: integer
          format: int64
        type:
          $ref: '#/components/schemas/BillType'
        amount:
          type: string
          format: decimal
          example: '38.00'
        remark:
          type: string
          maxLength: 255
          nullable: true
        billDate:
          type: string
          format: date
        tagIds:
          type: array
          items:
            type: integer
            format: int64
        source:
          $ref: '#/components/schemas/BillSource'
        voiceText:
          type: string
          maxLength: 500
          nullable: true

    BillUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/BillCreateRequest'

    Bill:
      type: object
      required: [id, ledgerId, accountId, categoryId, type, amount, billDate, source]
      properties:
        id:
          type: integer
          format: int64
        ledgerId:
          type: integer
          format: int64
          description: 当前默认账本 ID
        accountId:
          type: integer
          format: int64
        accountName:
          type: string
        categoryId:
          type: integer
          format: int64
        categoryName:
          type: string
          description: 二级分类名称优先
        categoryIcon:
          type: string
          nullable: true
        type:
          $ref: '#/components/schemas/BillType'
        amount:
          type: string
          format: decimal
        remark:
          type: string
          nullable: true
        billDate:
          type: string
          format: date
        source:
          $ref: '#/components/schemas/BillSource'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'

    BillDetail:
      allOf:
        - $ref: '#/components/schemas/Bill'
        - type: object
          properties:
            voiceText:
              type: string
              nullable: true
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    BillPage:
      type: object
      required: [pageNo, pageSize, total, list]
      properties:
        pageNo:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        list:
          type: array
          items:
            $ref: '#/components/schemas/Bill'

    CalendarSummaryItem:
      type: object
      required: [date, expenseAmount, incomeAmount]
      properties:
        date:
          type: string
          format: date
        expenseAmount:
          type: string
          format: decimal
          example: '80.00'
        incomeAmount:
          type: string
          format: decimal
          example: '0.00'

    VoiceParseRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 500
          description: 语音识别后的原始文本

    VoiceParsedBill:
      type: object
      required: [type, amount, confidence]
      properties:
        type:
          $ref: '#/components/schemas/BillType'
        amount:
          type: string
          format: decimal
        categoryId:
          type: integer
          format: int64
          nullable: true
        categoryName:
          type: string
          nullable: true
        categoryIcon:
          type: string
          nullable: true
        remark:
          type: string
          nullable: true
        billDate:
          type: string
          format: date
          nullable: true
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
        needsConfirm:
          type: boolean
          description: 是否需要用户补充或确认

    CategoryExpenseStat:
      type: object
      required: [categoryId, categoryName, amount, percent]
      properties:
        categoryId:
          type: integer
          format: int64
        categoryName:
          type: string
        categoryIcon:
          type: string
          nullable: true
        amount:
          type: string
          format: decimal
        percent:
          type: number
          format: float

    StatsSummary:
      type: object
      required: [total, count]
      properties:
        total:
          type: string
          format: decimal
          description: 当期类型总金额
        count:
          type: integer
          description: 当期账单笔数
        dailyAvg:
          type: string
          format: decimal
          description: 当期日均金额；period=all 时不返回
        prevTotal:
          type: string
          format: decimal
          description: 上一周期总金额；period=all 时不返回
        changePercent:
          type: number
          format: float
          nullable: true
          description: 兼容旧客户端的上一周期变化百分比；月维度等同环比，年维度等同比，上一周期为 0 时为 null
        yearOverYear:
          $ref: '#/components/schemas/StatsComparison'
        periodOverPeriod:
          $ref: '#/components/schemas/StatsComparison'

    StatsComparison:
      type: object
      required: [label, amount, changePercent]
      properties:
        label:
          type: string
          enum: [同比, 环比]
          description: 对比类型
        amount:
          type: string
          format: decimal
          description: 对比周期总金额
        changePercent:
          type: number
          format: float
          nullable: true
          description: 当前周期相对对比周期的变化百分比；对比周期金额为 0 时为 null

    StatsCategoryItem:
      type: object
      required: [categoryId, categoryName, amount, percent, count]
      properties:
        categoryId:
          type: string
        categoryName:
          type: string
        categoryIcon:
          type: string
          nullable: true
        amount:
          type: string
          format: decimal
        percent:
          type: number
          format: float
        count:
          type: integer
        prevAmount:
          type: string
          format: decimal
        changePercent:
          type: number
          format: float
          nullable: true

    StatsOverviewResult:
      type: object
      required: [summary, categories, insights, economicIndicators]
      properties:
        summary:
          $ref: '#/components/schemas/StatsSummary'
        categories:
          type: array
          description: 按金额降序，前端可截取前 N 项后将剩余合并为「其他」
          items:
            $ref: '#/components/schemas/StatsCategoryItem'
        insights:
          type: array
          description: 后端基于聚合结果生成的关键洞察文案（一般 1-2 条）
          items:
            type: string
        economicIndicators:
          type: array
          description: 5项经济指标，分母统一为当期收入总额，分子来自经济属性标签
          items:
            $ref: '#/components/schemas/StatsEconomicIndicator'

    StatsEconomicIndicator:
      type: object
      required: [key, name, value, valueText, numerator, denominator, formula, description]
      properties:
        key:
          type: string
          enum: [engel, rigidLiving, debtRepayment, optionalConsumption, savingsRate]
        name:
          type: string
          description: 指标名称：恩格尔系数、生活刚性、债务还款、可选消费、储蓄率
        value:
          type: number
          nullable: true
          description: 指标百分比数值；收入总额为0时为null
        valueText:
          type: string
          description: 前端直接展示的百分比文本；收入总额为0时为--
        numerator:
          type: string
          format: decimal
          description: 分子金额
        denominator:
          type: string
          format: decimal
          description: 收入总额
        formula:
          type: string
          description: 计算公式
        description:
          type: string
          description: 指标说明

    StatsCategoryTrendResult:
      type: object
      required: [months, data]
      properties:
        months:
          type: array
          description: 6 个 YYYY-MM
          items:
            type: string
        data:
          type: array
          items:
            type: object
            required: [categoryId, categoryName, amounts]
            properties:
              categoryId:
                type: string
              categoryName:
                type: string
              categoryIcon:
                type: string
                nullable: true
              amounts:
                type: array
                description: 长度 6，对应 months
                items:
                  type: string
                  format: decimal

    StatsDailySeriesResult:
      type: object
      required: [granularity, points]
      properties:
        granularity:
          type: string
          enum: [day, month]
        points:
          type: array
          items:
            type: object
            required: [date, amount]
            properties:
              date:
                type: string
                description: granularity=day 时为 YYYY-MM-DD；granularity=month 时为 YYYY-MM
              amount:
                type: string
                format: decimal

    StatsTopBillsResult:
      type: object
      required: [bills]
      properties:
        bills:
          type: array
          items:
            type: object
            required: [id, amount, billDate, type, categoryName, accountName]
            properties:
              id:
                type: string
              amount:
                type: string
                format: decimal
              billDate:
                type: string
                description: YYYY-MM-DD
              type:
                type: integer
                enum: [1, 2]
              categoryName:
                type: string
              categoryIcon:
                type: string
                nullable: true
              accountName:
                type: string
              remark:
                type: string
                nullable: true

    FeedbackImageUploadResult:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri

    FeedbackCreateRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 1000
        imageUrls:
          type: array
          maxItems: 3
          items:
            type: string
            format: uri

    FeedbackCreateResult:
      type: object
      required: [id, createdAt]
      properties:
        id:
          type: string
          description: feedbacks.id 的字符串形式
        createdAt:
          type: string
          format: date-time

    ImportBillsResult:
      type: object
      required: [success, totalRows, successCount, skipDuplicateCount, errorCount, message]
      properties:
        success:
          type: boolean
          description: 是否成功完成导入（即便 successCount=0 但全部为重复跳过也视为 success=true）
        totalRows:
          type: integer
          description: Excel 中非空数据行总数
        successCount:
          type: integer
          description: 成功入账的条数
        skipDuplicateCount:
          type: integer
          description: 因重复而自动跳过的条数
        errorCount:
          type: integer
          description: 校验失败的条数（>0 时整批未入账）
        errorFileUrl:
          type: string
          description: 错误清单 Excel 的下载地址；仅在 errorCount>0 时返回，24 小时后失效
        message:
          type: string
          description: 提示文案
