name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: main
    steps:
      - name: Check server status
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 2m
          script: |
            echo "=== 停止并删除 ddyq-mysql ==="
            docker stop ddyq-mysql 2>/dev/null && echo "已停止" || echo "容器不存在或已停止"
            docker rm ddyq-mysql 2>/dev/null && echo "已删除" || echo "容器已不存在"

            echo "=== 在 todo-fairy-mysql 中建库 ==="
            docker exec todo-fairy-mysql mysql -uroot -proot \
              -e "CREATE DATABASE IF NOT EXISTS doudouyouqian CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;" \
              && echo "doudouyouqian 数据库已就绪" || echo "建库失败，请检查密码"

            echo "=== 当前内存 ==="
            free -h

            echo "=== 当前容器 ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.MemUsage}}"
