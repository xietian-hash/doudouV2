name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: main
    steps:
      - name: Check server status
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 2m
          script: |
            echo "=== 镜像内 dist 目录内容 ==="
            docker run --rm api-ddyqv2-api:latest ls -la /app/apps/api/dist/ 2>&1 || echo "dist 目录不存在或镜像不存在"

            echo "=== 镜像内 /app 目录结构 ==="
            docker run --rm api-ddyqv2-api:latest find /app/apps/api/dist -name "*.js" 2>&1 | head -20 || echo "无 JS 文件"
