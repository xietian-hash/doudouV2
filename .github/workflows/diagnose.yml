name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: main
    steps:
      - name: Check server status
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 2m
          script: |
            echo "=== 尝试通用密码连接 todo-fairy-mysql ==="
            for pwd in root 123456 password mysql admin ""; do
              if docker exec todo-fairy-mysql mysql -uroot -p"$pwd" -e "SELECT 1;" 2>/dev/null | grep -q 1; then
                echo "密码成功: '$pwd'"
                break
              else
                echo "密码失败: '$pwd'"
              fi
            done
