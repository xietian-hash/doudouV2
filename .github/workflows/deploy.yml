name: Deploy API

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-api
  cancel-in-progress: true

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    environment: main
    env:
      DEPLOY_DIR_NAME: api-ddyqV2
      DEPLOY_ARCHIVE: deploy-bundle.tar.gz
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create deploy bundle
        run: |
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=apps/miniapp \
            --exclude=data \
            --exclude=coverage \
            --exclude="$DEPLOY_ARCHIVE" \
            -czf "$DEPLOY_ARCHIVE" . || [ "$?" -eq 1 ]

      - name: Upload deploy bundle
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          PORT: ${{ secrets.DEPLOY_PORT }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          KEY_FILE=$(mktemp)
          echo "$SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          scp -i "$KEY_FILE" -P "$PORT" -o StrictHostKeyChecking=no \
            "$DEPLOY_ARCHIVE" "$USER@$HOST:~/"
          rm -f "$KEY_FILE"

      - name: Cleanup stale containers on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker stop ddyq-api 2>/dev/null || true
            docker rm -f ddyq-api 2>/dev/null || true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_DIR_NAME: ${{ env.DEPLOY_DIR_NAME }}
          DEPLOY_ARCHIVE: ${{ env.DEPLOY_ARCHIVE }}
          SECRET_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          SECRET_JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          SECRET_WECHAT_APP_ID: ${{ secrets.PROD_WECHAT_APP_ID }}
          SECRET_WECHAT_APP_SECRET: ${{ secrets.PROD_WECHAT_APP_SECRET }}
          SECRET_LLM_API_KEY: ${{ secrets.PROD_LLM_API_KEY }}
          SECRET_LLM_MODEL: ${{ secrets.PROD_LLM_MODEL }}
          SECRET_ASR_API_KEY: ${{ secrets.PROD_ASR_API_KEY }}
          SECRET_SERVER_BASE_URL: ${{ secrets.PROD_SERVER_BASE_URL }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_DIR_NAME,DEPLOY_ARCHIVE,SECRET_DATABASE_URL,SECRET_JWT_SECRET,SECRET_WECHAT_APP_ID,SECRET_WECHAT_APP_SECRET,SECRET_LLM_API_KEY,SECRET_LLM_MODEL,SECRET_ASR_API_KEY,SECRET_SERVER_BASE_URL
          command_timeout: 30m
          script_stop: true
          script: |
            set -e

            DEPLOY_DIR="$HOME/$DEPLOY_DIR_NAME"
            mkdir -p "$DEPLOY_DIR"

            tar -xzf "$HOME/$DEPLOY_ARCHIVE" -C "$DEPLOY_DIR"
            rm -f "$HOME/$DEPLOY_ARCHIVE"

            cd "$DEPLOY_DIR"

            cat > .env.production <<EOF
            PORT=3000
            NODE_ENV=production
            JWT_EXPIRES_IN=7d
            DATABASE_URL=${SECRET_DATABASE_URL}
            JWT_SECRET=${SECRET_JWT_SECRET}
            WECHAT_APP_ID=${SECRET_WECHAT_APP_ID}
            WECHAT_APP_SECRET=${SECRET_WECHAT_APP_SECRET}
            LLM_PROVIDER=doubao
            LLM_BASE_URL=https://ark.cn-beijing.volces.com/api/v3
            LLM_MODEL=${SECRET_LLM_MODEL}
            LLM_API_KEY=${SECRET_LLM_API_KEY}
            ASR_API_KEY=${SECRET_ASR_API_KEY}
            ASR_RESOURCE_ID=volc.seedasr.auc
            ASR_SUBMIT_URL=https://openspeech.bytedance.com/api/v3/auc/bigmodel/submit
            ASR_QUERY_URL=https://openspeech.bytedance.com/api/v3/auc/bigmodel/query
            SERVER_BASE_URL=${SECRET_SERVER_BASE_URL}
            EOF

            # 禁用 Compose bake（需要 buildx），保留 BuildKit 自身缓存不受 prune 影响
            COMPOSE_BAKE=false docker compose -f docker-compose.deploy.yml build --build-arg CACHE_BUST=$(date +%s)

            # 用临时容器（sleep）执行 migrate：
            # 避免 NestJS 启动崩溃导致无法 exec，sleep 保持容器稳定运行
            docker rm -f ddyq-api-migrate 2>/dev/null || true
            docker run -d \
              --name ddyq-api-migrate \
              --network api-todofairyv2_default \
              --env-file .env.production \
              api-ddyqv2-api:latest \
              sleep 120

            sleep 3

            echo "=== 运行 prisma migrate ==="
            DB_URL=$(grep '^DATABASE_URL=' .env.production | cut -d= -f2-)
            docker exec \
              -e DATABASE_URL="$DB_URL" \
              ddyq-api-migrate \
              /app/apps/api/node_modules/.bin/prisma migrate deploy \
              --schema /app/apps/api/prisma/schema.prisma

            docker rm -f ddyq-api-migrate 2>/dev/null || true

            # 启动真正的 api，并打印启动日志供调试
            COMPOSE_IGNORE_ORPHANS=true docker compose -f docker-compose.deploy.yml up -d api

            # 构建完新镜像后再清理悬空旧层，加速后续容器 overlay 初始化
            docker image prune -f

            sleep 10
            echo "=== api 启动日志 ==="
            docker logs ddyq-api --tail 30 2>&1 || true

      - name: Sync nginx config
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_DIR_NAME: ${{ env.DEPLOY_DIR_NAME }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_DIR_NAME
          script: |
            CERT="/etc/letsencrypt/live/api-accounts.aitrealmaker.top/fullchain.pem"
            CONF_SRC="$HOME/$DEPLOY_DIR_NAME/deploy/nginx/api-accounts.aitrealmaker.top.conf"
            CONF_DEST="/etc/nginx/sites-available/api-accounts.aitrealmaker.top"
            if [ -f "$CERT" ] && [ -f "$CONF_SRC" ]; then
              cp "$CONF_SRC" "$CONF_DEST"
              ln -sf "$CONF_DEST" /etc/nginx/sites-enabled/api-accounts.aitrealmaker.top
              nginx -t && nginx -s reload
            fi
