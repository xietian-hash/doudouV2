version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: ddyq-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: doudouyouqian
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - '3306:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ddyq-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-root}@mysql:3306/doudouyouqian
    ports:
      - '3000:3000'

  nginx:
    image: nginx:alpine
    container_name: ddyq-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  mysql_data:
